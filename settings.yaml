# MyKnowledge Skill 配置

skill:
  name: myknowledge
  version: "1.0.0"
  description: "通用知识库管理 Skill"

# 安装源配置（首次运行时自动检测或手动设置）
install_source:
  # 可能的值:
  # - skillhub_web    : 通过 Skill Hub 网页/IDE 插件安装（有自动更新）
  # - skillhub_cli    : 通过 SkillHub CLI 手动安装（需手动检查更新）
  # - clawhub         : 通过 ClawHub 安装
  # - github_zip      : 通过 GitHub ZIP 下载安装
  # - github_clone    : 通过 GitHub git clone 安装
  # - manual          : 手动复制安装
  # - unknown         : 未知来源
  source: "unknown"
  
  # 检测方式（由 onboarding 设置）
  detected_by: ""
  
  # 各安装源的更新策略
  update_strategy:
    skillhub_web:
      # Skill Hub 网页/IDE 插件安装
      # 特点：Skill Hub 会自动推送更新通知
      auto_notify: true
      user_action: "点击更新按钮"
      preserve_config: true
      
    skillhub_cli:
      # SkillHub CLI 手动安装
      # 特点：需要手动运行 CLI 命令检查更新
      auto_notify: false
      check_command: "skillhub check-update myknowledge"
      update_command: "skillhub update myknowledge"
      check_interval_days: 7
      
    clawhub:
      # ClawHub 安装
      # 特点：使用 clawhub CLI 管理
      auto_notify: false
      check_command: "clawhub list --outdated"
      update_command: "clawhub update myknowledge"
      
    github_zip:
      # GitHub ZIP 下载
      # 特点：完全手动，需重新下载 ZIP
      auto_notify: false
      check_url: "https://api.github.com/repos/CoderMoray/MyKnowledge/releases/latest"
      download_url: "https://github.com/CoderMoray/MyKnowledge/releases"
      check_interval_days: 7
      
    github_clone:
      # GitHub git clone
      # 特点：可用 git pull 更新
      auto_notify: false
      check_command: "cd /path/to/skill && git fetch origin"
      update_command: "cd /path/to/skill && git pull origin main"
      
    manual:
      # 手动复制
      # 特点：完全手动，需重新复制文件
      auto_notify: false
      check_url: "https://github.com/CoderMoray/MyKnowledge/releases"

# 用户数据目录（与 Skill 文件分离，更新时保留）
user_data:
  # 用户配置和状态存储位置
  base_dir: "~/.myknowledge"
  config_dir: "~/.myknowledge/config"
  
  # 各配置文件路径
  state_file: "~/.myknowledge/config/skill-state.yaml"
  version_file: "~/.myknowledge/config/version"
  install_source_file: "~/.myknowledge/config/install-source"
  
  # 全局知识库位置
  global_kb: "~/.myknowledge/global"

# 版本兼容性
version_compatibility:
  # 当前 Skill 版本
  current: "1.0.0"
  
  # 配置格式版本
  config_format: "1.0"
  
  # 兼容的配置版本（可自动迁移）
  compatible_configs:
    - "1.0"

# 平台检测配置
platform_detection:
  enabled: true
  paths:
    openclaw: "~/.openclaw"
    codebuddy: "~/.codebuddy"
    workbuddy: "~/.workbuddy"

# 功能特性
features:
  # 静默模式（自动检测复杂任务）
  silent_mode:
    enabled: true
    description: "自动检测任务复杂度并创建知识库"
    
  # 需求管理
  requirement_management:
    enabled: true
    id_format: "REQ-{date}-{seq}"
    
  # 状态管理
  status_management:
    enabled: true
    states:
      - Created
      - In Progress
      - Review
      - Done
      - Cancelled

# 存储位置
storage:
  # 全局知识库
  global:
    path: "~/.myknowledge/global"
    description: "跨项目共享知识"
    
  # 项目知识库
  project:
    path: "{project-path}/.myknowledge"
    description: "项目专属知识"

# 目录结构模板
directory_structure:
  - README.md
  - requirements/
    - README.md
  - public/
    - README.md
  - archive/
    - README.md
  - PROJECT-STATUS.md

# 首次引导配置
onboarding:
  # 是否已完成（由系统自动管理）
  completed: false
  
  # 引导文件位置
  prompt_file: "prompts/onboarding.md"
  
  # 是否显示平台选择
  show_platform_selection: true
  
  # OpenClaw 用户是否显示 Hook 引导
  show_hook_guide_for_openclaw: true
  
  # 是否询问存储位置偏好
  ask_storage_preference: false
  
  # 是否提供新手实操示例
  offer_tutorial: true
  
  # 是否检测安装源
  detect_install_source: true

# 复杂任务检测规则
complex_task_detection:
  keywords:
    - "分析"
    - "统计"
    - "挖掘"
    - "开发"
    - "设计"
    - "调研"
    - "整理"
    - "清洗"
    - "项目"
    - "系统"
  
  # 提高阈值，减少误触发
  min_keyword_count: 3
  
  # 否定模式：包含这些词时降低触发概率
  exclude_patterns:
    - "简单"
    - "粗略"
    - "快速"
    - "大概"
    - "随便"
    - "帮我看看"
  
  indicators:
    - "多步骤"
    - "长期"
    - "跟踪"
    - "记录"
    - "文档"
  
  # 首次静默创建时询问用户偏好
  require_confirmation: true

# 模板配置
templates:
  project_status: "templates/project-status-template.md"
  requirement_readme: "templates/requirement-readme-template.md"
  design_doc: "templates/design-doc-template.md"

# 更新检查配置
update_check:
  enabled: true
  
  # 根据安装源使用不同策略
  strategies:
    # SkillHub 网页/IDE 安装 - 依赖 SkillHub 通知
    skillhub_web:
      type: "external"
      message: "Skill Hub 会自动通知更新，请关注通知"
    
    # SkillHub CLI 安装 - 手动检查
    skillhub_cli:
      type: "manual_cli"
      check_command: "skillhub check-update myknowledge"
      update_command: "skillhub update myknowledge"
      interval_days: 7
    
    # ClawHub 安装 - 手动检查
    clawhub:
      type: "manual_cli"
      check_command: "clawhub list --outdated"
      update_command: "clawhub update myknowledge"
    
    # GitHub ZIP - 手动下载
    github_zip:
      type: "manual_url"
      check_url: "https://api.github.com/repos/CoderMoray/MyKnowledge/releases/latest"
      download_url: "https://github.com/CoderMoray/MyKnowledge/releases"
      interval_days: 7
    
    # GitHub Clone - git pull
    github_clone:
      type: "git"
      check_command: "git fetch origin && git log HEAD..origin/main --oneline"
      update_command: "git pull origin main"
    
    # 手动安装 - 查看 releases
    manual:
      type: "manual_url"
      check_url: "https://github.com/CoderMoray/MyKnowledge/releases"
      interval_days: 30
